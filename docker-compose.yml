services:
  mei-hua-wenshi:
    build: .
    container_name: mei-hua-wenshi
    ports:
      - "3007:80"
    depends_on:
      - ai-proxy
    restart: unless-stopped

  ai-proxy:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: mei-hua-wenshi-ai-proxy
    env_file:
      - .env
    environment:
      - TZ=Asia/Shanghai
      - DATA_FILE=/data/app-data.json
    volumes:
      - ./data:/data
    restart: unless-stopped
